<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="100" fill="#1e3a5f"/>
  
  <!-- Orange accent bar at bottom -->
  <rect x="0" y="420" width="512" height="92" rx="0" fill="#E8792A"/>
  <rect x="0" y="400" width="512" height="30" rx="0" fill="#E8792A"/>

  <!-- Letter M -->
  <text x="56" y="360" font-family="Arial Black, sans-serif" font-weight="900" font-size="280" fill="white">M</text>
  
  <!-- Letter H in orange -->
  <text x="256" y="360" font-family="Arial Black, sans-serif" font-weight="900" font-size="280" fill="#E8792A">H</text>
</svg>
