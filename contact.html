<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | MaliyetHesap</title>
    <meta name="description" content="Have questions about construction costs in Turkey? Contact the MaliyetHesap team for suggestions and support.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#1e3a5f',
                        'navy-dark': '#162b46',
                        orange: '#E8792A',
                        cream: '#FAF7F2',
                        green: '#2E7D52',
                        border: '#E2DDD6',
                    },
                    fontFamily: {
                        sans: ['Source Sans Pro', 'sans-serif'],
                        heading: ['Nunito', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style type="text/css">
        body {
            background-color: #FAF7F2;
            color: #1e3a5f;
            font-family: 'Source Sans Pro', sans-serif;
        }
        h1, h2, h3, .font-heading {
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
        }
        .hero-gradient {
            background: linear-gradient(to bottom, #1e3a5f, #162b46);
        }
        input, textarea {
            border: 1.5px solid #E2DDD6;
            transition: all 0.2s ease;
        }
        input:focus, textarea:focus {
            border-color: #E8792A;
            outline: none;
            box-shadow: 0 0 0 4px rgba(232, 121, 42, 0.1);
        }
    </style>
</head>
<body class="antialiased">

    <!-- NAVBAR -->
    <nav class="bg-navy py-4 px-6 md:px-12 sticky top-0 z-50 no-print border-b border-white/5">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="index.html" class="text-2xl font-heading font-extrabold text-white">
                Maliyet<span class="text-orange">Hesap</span>
            </a>
            
            <!-- Desktop Menu -->
            <div class="hidden md:flex items-center space-x-8 text-white/90 text-sm font-semibold tracking-wide">
                <a href="index.html" class="hover:text-orange transition-colors">Home</a>
                <a href="about.html" class="hover:text-orange transition-colors">About</a>
                <a href="contact.html" class="text-orange">Contact</a>
            </div>

            <!-- Mobile Menu Button -->
            <button id="mobile-menu-button" class="md:hidden text-white focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path id="menu-icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>

        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden mt-4 pb-4 space-y-4 text-center border-t border-white/10 pt-4">
            <a href="index.html" class="block text-white hover:text-orange py-2">Home</a>
            <a href="about.html" class="block text-white hover:text-orange py-2">About</a>
            <a href="contact.html" class="block text-orange py-2">Contact</a>
        </div>
    </nav>

    <!-- SECTION 1: HEADING -->
    <header class="hero-gradient py-24 px-6 md:px-12 text-center text-white relative overflow-hidden">
        <div class="max-w-4xl mx-auto relative z-10">
            <h1 class="text-4xl md:text-6xl font-heading mb-6">Contact Us</h1>
            <p class="text-xl text-white/80 font-medium">Have a question or suggestion? We would love to hear from you.</p>
        </div>
    </header>

    <!-- SECTION 2: CONTACT FORM -->
    <main class="max-w-3xl mx-auto py-20 px-6 md:px-12">
        <div class="bg-white p-8 md:p-12 rounded-[32px] shadow-xl border border-border">
            <form action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="name" class="block text-sm font-bold text-navy mb-2">Name</label>
                        <input type="text" id="name" name="name" required class="w-full px-4 py-3 rounded-xl bg-cream/30" placeholder="John Doe">
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-bold text-navy mb-2">Email</label>
                        <input type="email" id="email" name="email" required class="w-full px-4 py-3 rounded-xl bg-cream/30" placeholder="john@example.com">
                    </div>
                </div>
                <div>
                    <label for="subject" class="block text-sm font-bold text-navy mb-2">Subject</label>
                    <input type="text" id="subject" name="subject" required class="w-full px-4 py-3 rounded-xl bg-cream/30" placeholder="How can we help?">
                </div>
                <div>
                    <label for="message" class="block text-sm font-bold text-navy mb-2">Message</label>
                    <textarea id="message" name="message" rows="5" required class="w-full px-4 py-3 rounded-xl bg-cream/30" placeholder="Your message here..."></textarea>
                </div>
                <button type="submit" class="w-full bg-orange hover:bg-[#D66A1F] text-white font-bold py-4 px-8 rounded-xl transition-all shadow-lg hover:shadow-orange/20 transform hover:-translate-y-1">
                    Send Message
                </button>
            </form>
        </div>

        <!-- SECTION 3: INFO BOX -->
        <div class="mt-12 p-8 bg-navy/5 rounded-3xl border border-navy/10 text-center">
            <p class="text-navy/70 font-medium">Prefer email? Write to us at: <a href="mailto:contact@toolsvault.com" class="text-orange hover:underline">contact@toolsvault.com</a></p>
        </div>

        <!-- SECTION 4: SEO TEXT -->
        <footer class="mt-24 pt-12 border-t border-border text-center text-navy/40 text-xs">
            <p>Contact the team behind MaliyetHesap — a free construction cost calculator for Turkey.</p>
        </footer>
    </main>

    <script>
        const mobileMenuButton = document.getElementById('mobile-menu-button');
        const mobileMenu = document.getElementById('mobile-menu');
        if (mobileMenuButton && mobileMenu) {
            mobileMenuButton.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
                const menuIcon = document.getElementById('menu-icon');
                if (mobileMenu.classList.contains('hidden')) {
                    menuIcon.setAttribute('d', 'M4 6h16M4 12h16M4 18h16');
                } else {
                    menuIcon.setAttribute('d', 'M6 18L18 6M6 6l12 12');
                }
            });
        }
    </script>
</body>
</html>
